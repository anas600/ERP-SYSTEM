version: 1
plan:
  name: 'إصلاح وتثبيت نظام ERP-SYSTEM محلياً'
  max_concurrency: 4
  max_consecutive_failures: 2
  max_cycles: 8
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  - id: 'backend-stability'
    title: 'إصلاح bug الـ Redis في health endpoints + smoke test للـ backend'
    prompt: |
      أنت senior .NET backend engineer. اعمل في المسار:
      C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM

      السياق: شغّلنا ERP-SYSTEM محلياً على Windows + PostgreSQL 15 (بدون Docker). الـ backend
      شغّال على http://localhost:5000 وكل الـ business APIs (auth, finance, inventory, projects)
      ترجع 200. لكن `/health/live` و `/health/ready` يرجعون 500 بسبب Redis connection.

      الحالة الراهنة (تم تعديلها لكن ما اتأكدنا):
      - ملف `src/backend/Host/Program.cs` السطر 132 يحتوي تعديل لاستخدام `ConfigurationOptions`
        مع `AbortOnConnectFail = false`.
      - لكن `--no-build` لم يلتقط التعديل، فاحتمال الـ dll المُحمَّل في الذاكرة قديم.

      المطلوب منك (بترتيب):

      1. **حالة الـ processes**: شغّل PowerShell:
         ```
         Get-Process | Where-Object {$_.Name -eq "ERPSystem.Host" -or $_.Name -eq "dotnet"} | Select-Object Id, Name, StartTime | Format-Table -AutoSize
         ```
         احفظ الأرقام وقتلها: `Stop-Process -Name "ERPSystem.Host" -Force; Stop-Process -Name "dotnet" -Force`

      2. **تحقق من `src/backend/Host/Program.cs`**: تأكد أن السطر 132-140 يحتوي:
         ```csharp
         if (!string.IsNullOrWhiteSpace(redisConn))
         {
             builder.Services.AddSingleton<IConnectionMultiplexer>(_ =>
             {
                 var configOptions = ConfigurationOptions.Parse(redisConn);
                 configOptions.AbortOnConnectFail = false;
                 configOptions.ConnectRetry = 3;
                 configOptions.ConnectTimeout = 2000;
                 return ConnectionMultiplexer.Connect(configOptions);
             });
         }
         ```
         لو مش موجود، أصلحه (هذا الـ fix من قبل؛ لو ضاع نطبّقه مرة ثانية).

      3. **dotnet build صريح** (في مجلد `src/backend/Host`):
         ```
         dotnet build
         ```
         يجب أن ينتهي بـ "Build succeeded. 0 Error(s)".

      4. **شغّل الـ backend في الخلفية**:
         ```powershell
         $env:ASPNETCORE_ENVIRONMENT = "Development"
         Start-Process -FilePath "dotnet" -ArgumentList "run", "--no-build", "--urls=http://localhost:5000" -WorkingDirectory "C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM\src\backend\Host" -RedirectStandardOutput "C:\Users\Anas\AppData\Local\Temp\backend_run.log" -RedirectStandardError "C:\Users\Anas\AppData\Local\Temp\backend_run.err.log" -PassThru -NoNewWindow
         ```
         انتظر 8 ثوانٍ ثم تأكد من اللوق.

      5. **اختبر health endpoints** (استخدم `curl.exe` مش `curl` alias):
         ```
         curl.exe -s -o /dev/null -w "%{http_code}" http://localhost:5000/health
         curl.exe -s -o /dev/null -w "%{http_code}" http://localhost:5000/health/live
         curl.exe -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:5000/health/ready
         ```
         المتوقع: كلهم 200. `/health/ready` سيرجع `redis: { healthy: false, error: "not connected" }` — هذا OK.
         لو `/health/live` يرجع 500، الـ fix فشل؛ ارجع للـ Program.cs وراجع (تأكد من أن `AbortOnConnectFail = false`).

      6. **Smoke test للـ business APIs**: أنشئ مستخدم جديد وسجّل دخول، ثم جلب:
         - POST /api/auth/register
         - POST /api/auth/login
         - GET /api/auth/me
         - GET /api/finance/accounts
         - GET /api/inventory/items
         - GET /api/projects
         استخدم `register.json` المُختبَر في `C:\Users\Anas\AppData\Local\Temp\register.json` (إن لم يوجد، أنشئه):
         ```json
         {
           "email": "smoke@backend.test",
           "password": "Pass1234",
           "fullName": "Smoke Test",
           "tenantName": "SmokeTest"
         }
         ```
         المتوقع: register → 200، login → 200، me → 200، business → 200 (مع JWT).

      7. **أعد Frontend dev server** (إن لم يكن شغّالاً):
         ```powershell
         Get-Process | Where-Object {$_.Name -eq "node"} | Select-Object Id
         # لو ما في node process شغّال على 3000:
         Start-Process -FilePath "cmd" -ArgumentList "/c", "npm run dev" -WorkingDirectory "C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM\src\frontend" -RedirectStandardOutput "C:\Users\Anas\AppData\Local\Temp\frontend.log" -RedirectStandardError "C:\Users\Anas\AppData\Local\Temp\frontend.err.log" -PassThru -NoNewWindow
         ```
         انتظر 6 ثوانٍ ثم:
         ```
         curl.exe -s -o /dev/null -w "%{http_code}" http://localhost:3000
         ```
         المتوقع: 200.

      8. **Output**: اكتب تقرير في `docs/SMOKE-TEST-REPORT.md` يحتوي:
         - كل نتيجة اختبار (HTTP code)
         - أي bugs لاحظتها
         - حالة الـ Redis fix (نجح/فشل)
         - حالة الـ Frontend
         - توصيات (إن وُجدت)

      توقف فقط لما:
      - كل health endpoints ترجع 200
      - كل business APIs ترجع 200 (مع JWT)
      - Frontend يخدم 200 على localhost:3000
      - التقرير مكتوب

      لا تعدّل أي ملف في `AGENTS.md` أو `CHANGELOG.md` (ذلك لـ track آخر).
    assigned_to: backend-architect
    verified_by: verifier
    max_retries: 2
    verify_prompt: |
      أنت verifier. تحقّق من عمل الـ backend والـ health endpoints فعلياً.

      افتح PowerShell ونفّذ:

      1. **تأكد أن الـ backend شغّال**:
         ```
         Get-Process | Where-Object {$_.Name -eq "ERPSystem.Host"} | Select-Object Id, StartTime
         ```
         يجب أن يكون هناك process شغّال.

      2. **اختبر health endpoints** (curl.exe):
         ```
         curl.exe -s -o /dev/null -w "GET /health: %{http_code}\n" --max-time 5 http://localhost:5000/health
         curl.exe -s -o /dev/null -w "GET /health/live: %{http_code}\n" --max-time 10 http://localhost:5000/health/live
         curl.exe -s -o /dev/null -w "GET /health/ready: %{http_code}\n" --max-time 15 http://localhost:5000/health/ready
         ```
         المتوقع: كلهم 200. لو /health/ready يرجع timeout (000) أو 500، FAIL.

      3. **اختبر /health/ready body**:
         ```
         curl.exe -s --max-time 15 http://localhost:5000/health/ready
         ```
         المتوقع: JSON يحتوي `status: "ready"` أو `"degraded"`، و `postgres_oltp.healthy: true`، و `redis.healthy: false` (هذا OK).

      4. **اختبر business API بـ fresh register**:
         أنشئ مستخدم فريد (timestamp) ثم سجّل دخوله:
         ```
         $body = @{
           email = "verify-$(Get-Date -Format yyyyMMddHHmmss)@test.com"
           password = "Pass1234"
           fullName = "Verify Test"
           tenantName = "VerifyTest"
         } | ConvertTo-Json
         $resp = curl.exe -s -X POST http://localhost:5000/api/auth/register -H "Content-Type: application/json" -d $body --max-time 10
         $token = ($resp | ConvertFrom-Json).accessToken
         ```
         تأكد من:
         - register يرجع 200
         - $token ليس null
         - GET /api/auth/me بـ $token يرجع 200

      5. **Frontend check**:
         ```
         curl.exe -s -o /dev/null -w "Frontend: %{http_code}\n" --max-time 10 http://localhost:3000
         ```
         المتوقع: 200.

      6. **راجع `docs/SMOKE-TEST-REPORT.md`** وتأكد:
         - موجود
         - يحتوي نتائج كل الاختبارات
         - لا يحتوي إدعاءات بـ "passed" بدون دليـل

      **PASS/FAIL**: قرر بناءً على:
      - PASS: كل health endpoints 200 + register/login/me/finance يعملون + Frontend 200.
      - FAIL: أي endpoint حرج يفشل، أو التقرير مفقود أو غير دقيق.
  - id: 'frontend-e2e'
    title: 'اختبار end-to-end للـ Frontend (register → login → dashboard → business pages)'
    prompt: |
      أنت Next.js/TypeScript frontend engineer. المسار:
      C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM\src\frontend

      السياق: الـ frontend شغّال على http://localhost:3000 (npm run dev). ملف `.env.local`
      فيه `NEXT_PUBLIC_API_URL=http://localhost:5000`. الـ Backend API يرد بـ JSON.

      لاحظات هامة من الـ code review:
      - `lib/api.ts` يحدّث ليشمل `baseCurrency` في `RegisterRequest` (لا subdomain).
      - `app/register/page.tsx` لا يحوي حقل subdomain في الـ form.
      - `localStorage` keys: `accessToken`, `refreshToken`, `user`.

      المطلوب منك (نفّذ بترتيب):

      1. **تأكد أن `.env.local` موجود**:
         ```
         Get-Content C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM\src\frontend\.env.local
         ```
         المتوقع: `NEXT_PUBLIC_API_URL=http://localhost:5000`.
         لو فاضي، أنشئه (استخدم Set-Content -Encoding UTF8 لتجنب PowerShell encoding bugs):
         ```powershell
         Set-Content -Path "C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM\src\frontend\.env.local" -Value "NEXT_PUBLIC_API_URL=http://localhost:5000" -Encoding UTF8
         ```

      2. **تأكد من نوع types الصحيح**:
         - اقرأ `src/frontend/lib/api.ts` وتأكد:
           - `RegisterRequest` يحوي: `email, password, fullName, tenantName, baseCurrency?` (لا subdomain)
           - `LoginRequest` يحوي: `email, password, tenantId?` (لا tenantSubdomain)
         - اقرأ `src/frontend/app/register/page.tsx` وتأكد:
           - لا يحوي حقل `subdomain` في الـ form state
           - لا يحوي `<input>` لـ subdomain

      3. **اختبار type-check**:
         ```
         cd C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM\src\frontend
         npm run type-check
         ```
         المتوقع: يمر بدون أخطاء (0 errors).
         لو فيه warnings، لا تَعتبرها فشل.

      4. **اختبار lint**:
         ```
         npm run lint
         ```
         المتوقع: يمر (0 errors).

      5. **اختبار build** (dry check، قد يستغرق 1-2 دقيقة):
         ```
         npm run build
         ```
         المتوقع: ينجح. لو فشل، سجّل الخطأ في التقرير.

      6. **اختبار API calls عبر curl** (simulate frontend):
         - تأكد من وجود Frontend dev server (port 3000).
         - استخدم نفس الـ JSON register للـ Backend API (port 5000) كما في backend-stability task.
         - اختبر sequence:
           1. register → تخزين accessToken في localStorage (simulated)
           2. GET /api/auth/me مع Authorization: Bearer → 200
           3. GET /api/finance/accounts مع نفس الـ token → 200
           4. GET /api/inventory/items → 200
           5. GET /api/projects → 200
         - سجّل كل نتيجة في التقرير.

      7. **تحقق من صفحات الـ Frontend** (curl):
         ```
         curl.exe -s -o /dev/null -w "%{http_code}" http://localhost:3000/
         curl.exe -s -o /dev/null -w "%{http_code}" http://localhost:3000/login
         curl.exe -s -o /dev/null -w "%{http_code}" http://localhost:3000/register
         curl.exe -s -o /dev/null -w "%{http_code}" http://localhost:3000/dashboard
         curl.exe -s -o /dev/null -w "%{http_code}" http://localhost:3000/finance/accounts
         curl.exe -s -o /dev/null -w "%{http_code}" http://localhost:3000/inventory/items
         curl.exe -s -o /dev/null -w "%{http_code}" http://localhost:3000/projects
         ```
         المتوقع: كلهم 200.

      8. **اختبار /dashboard**: لو /dashboard يحوي logic يفحص auth ويعمل redirect لـ /login، الـ curl قد يرجع 200 (HTML) أو 307 (redirect). كلاهما OK.

      9. **Output**: اكتب `docs/FRONTEND-E2E-REPORT.md`:
         - نتائج كل curl (HTTP code)
         - نتائج type-check / lint / build
         - أي bugs لاحظتها في الـ frontend code
         - توصيات

      توقف فقط لما:
      - كل pages ترجع 200
      - type-check يمر
      - API sequence (register → me → business) يعمل
      - التقرير مكتوب

      لا تلمس الـ backend code.
    assigned_to: frontend-engineer
    verified_by: verifier
    max_retries: 2
    verify_prompt: |
      أنت verifier. تحقّق من عمل الـ Frontend فعلياً.

      1. **تأكد أن Frontend dev server شغّال**:
         ```
         Get-Process | Where-Object {$_.Name -eq "node"} | Select-Object Id, StartTime
         ```
         ثم:
         ```
         Test-NetConnection -ComputerName localhost -Port 3000 -InformationLevel Quiet
         ```
         المتوقع: True.

      2. **اختبار كل الصفحات** (curl.exe):
         ```
         for ($p in "/", "/login", "/register", "/dashboard", "/finance/accounts", "/inventory/items", "/projects") {
           $code = (curl.exe -s -o /dev/null -w "%{http_code}" --max-time 5 "http://localhost:3000$p")
           Write-Host "$p : $code"
         }
         ```
         المتوقع: كلهم 200 أو 307 (redirect for /dashboard). أي 500 أو 404 = FAIL.

      3. **تأكد من `.env.local`**:
         ```
         Get-Content C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM\src\frontend\.env.local
         ```
         المتوقع: يحوي `NEXT_PUBLIC_API_URL=http://localhost:5000`.

      4. **راجع `lib/api.ts`**:
         - يجب ألا يحوي `subdomain` في `RegisterRequest`.
         - يجب ألا يحوي `tenantSubdomain` في `LoginRequest`.
         - يجب أن يحوي `baseCurrency?` في `RegisterRequest`.

      5. **راجع `app/register/page.tsx`**:
         - يجب ألا يحوي حقل subdomain في الـ form.
         - يجب ألا يحوي `useState({...subdomain...})`.

      6. **راجع `docs/FRONTEND-E2E-REPORT.md`**:
         - موجود
         - يحتوي نتائج صحيحة (لا fabricated)

      **PASS/FAIL**:
      - PASS: كل الصفحات 200/307 + types صحيحة + .env.local صحيح + تقرير دقيق.
      - FAIL: أي page يفشل، أو types قديمة، أو .env.local فاضي، أو التقرير مفقود/غير دقيق.
  - id: 'docs-audit'
    title: 'مراجعة شاملة للتوثيق الرسمي (AGENTS.md files) للتأكد من المطابقة مع الكود'
    prompt: |
      أنت technical writer/auditor. المسار: C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM

      السياق: أنجزنا جولة تعديل على AGENTS.md files والـ CHANGELOG.md. لكن بقيت ملفات
      AGENTS.md في مجلدات فرعية لم نُحدّثها. المطلوب: مراجعتها وتحديثها لتطابق الكود الفعلي.

      قائمة الملفات التي تحتاج مراجعة:

      1. `src/backend/AGENTS.md` (Backend conventions)
      2. `src/backend/Host/AGENTS.md` (Host entry point)
      3. `src/backend/Shared/AGENTS.md` (Shared concerns)
      4. `src/backend/Shared/Events/AGENTS.md` (Event bus)
      5. `src/backend/Modules/Identity/AGENTS.md` (✅ مُعدَّل جزئياً — تحقق من الـ BaseCurrency)
      6. `src/backend/Modules/Finance/AGENTS.md` (إن وُجد)
      7. `src/backend/Modules/Projects/AGENTS.md` (إن وُجد)
      8. `src/backend/Modules/Inventory/AGENTS.md` (إن وُجد)
      9. `src/backend/Modules/Reports/AGENTS.md` (إن وُجد)
      10. `src/backend/Modules/Notifications/AGENTS.md` (إن وُجد)
      11. `src/backend/Modules/Companies/AGENTS.md` (إن وُجد)
      12. `src/backend/Tests/AGENTS.md` (إن وُجد)
      13. `infra/AGENTS.md` (Infra conventions)
      14. `infra/docker/AGENTS.md` (✅ مُعدَّل جزئياً — تحقق)
      15. `infra/.github/AGENTS.md` (CI/CD)
      16. `docs/AGENTS.md` (docs index)

      لكل ملف:

      **Step A: اقرأ الـ AGENTS.md كاملاً.**

      **Step B: اقرأ الكود الفعلي في المجلد المعني** (مثلاً لـ `Modules/Finance/AGENTS.md`،
      اقرأ `src/backend/Modules/Finance/Application/**/*.cs` و `Infrastructure/**/*.cs`).

      **Step C: قارن وحدّد الفجوات**:
      - هل يذكر أسماء controllers/entities قديمة؟ (مثلاً "Phase 1" للـ Finance اللي مكتمل)
      - هل يذكر DTO contracts قديمة؟
      - هل يذكر API routes خاطئة؟
      - هل يذكر phase status غير صحيح؟
      - هل يحوي معلومات obsolete؟

      **Step D: أصلح الفجوات** بالـ Edit tool. لا تحذف ملفات. اعمل updates minimal.

      **Step E: أضف changelog entry في `docs/CHANGELOG.md`** في القسم 2026-06-17 يذكر الملفات
      التي حدّثتها.

      ركّز بشكل خاص:
      - `src/backend/AGENTS.md` يقول "📋 Phase 1" للـ Finance و "📋 Phase 2" للـ Projects/Inventory —
        لكن الكود مكتمل (حسب PLAN.md v2.0). حدّث لـ "✅ مكتمل".
      - `src/backend/Host/AGENTS.md` — تحقق من Health endpoints list (هل يذكر `/health/ready`؟).
      - `infra/.github/AGENTS.md` — راجع CI config في `.github/workflows/`.

      **Output**: اكتب تقرير في `docs/DOCS-AUDIT-REPORT.md`:
      - قائمة الملفات التي راجعتها (✅ راجعتها / ⏭️ لم تكن موجودة)
      - الفجوات اللي لقيتها
      - الإصلاحات اللي عملتها (مع file paths)
      - أي فجوات بقيت (إن وُجدت)

      توقف فقط لما:
      - كل AGENTS.md files الموجودة تم مراجعتها
      - التقرير مكتوب
      - تم تحديث CHANGELOG.md
    assigned_to: general
    verified_by: verifier
    max_retries: 2
    verify_prompt: |
      أنت verifier. تحقّق من جودة الـ docs audit.

      1. **اقرأ `docs/DOCS-AUDIT-REPORT.md`**:
         - موجود؟
         - يذكر عدد الملفات التي روجعت؟
         - يذكر فجوات ملموسة؟

      2. **اعمل spot-check** على 3 ملفات عشوائياً:
         - اختر 3 AGENTS.md files من القائمة.
         - اقرأ الـ AGENTS.md + اقرأ الكود الفعلي في المجلد.
         - هل المعلومات في الـ AGENTS.md تطابق الكود؟

         أمثلة فحص سريع:
         - `src/backend/AGENTS.md` يقول Finance/Projects/Inventory "Phase X" — هل هذا صحيح بناءً على `docs/PLAN.md`؟
         - `infra/docker/AGENTS.md` يقول postgres:15-alpine — هل يطابق `docker-compose.dev.yml`؟
         - `src/frontend/AGENTS.md` يذكر Tailwind فقط (لا shadcn) — هل `package.json` يحوي shadcn-ui كـ CLI فقط؟

      3. **تحقق من `docs/CHANGELOG.md`**:
         - تم إضافة section/entry جديد في 2026-06-17 عن الـ docs audit؟
         - يذكر الملفات المحدثة؟

      4. **تحقق من `git status`**:
         ```
         cd C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM
         git status --short
         ```
         يجب أن يكون هناك ملفات معدلة (M) في AGENTS.md files + ملفات جديدة (??) للتقارير.

      **PASS/FAIL**:
      - PASS: التقرير مكتوب + spot-check 3 ملفات يثبت التطابق + CHANGELOG محدّث.
      - FAIL: التقرير مفقود، أو الفجوات المعلن عنها لا تتطابق مع الواقع، أو CHANGELOG لم يُحدّث.
  - id: 'final-integration'
    title: 'الاختبار النهائي الشامل: end-to-end للنظام كله'
    prompt: |
      أنت integration tester / verifier نهائي. اعمل smoke test شامل على النظام.

      المسار: C:\Users\Anas\.minimax-agent\projects\ERP-SYSTEM

      المتوقع أن كل الـ tasks السابقة (backend-stability, frontend-e2e, docs-audit) انتهت.

      افتح PowerShell ونفّذ السيناريو الكامل:

      **الجزء 1: البنية التحتية**
      ```
      # 1. PostgreSQL شغّال؟
      Test-NetConnection -ComputerName localhost -Port 5432 -InformationLevel Quiet
      # المتوقع: True

      # 2. Backend شغّال؟
      Test-NetConnection -ComputerName localhost -Port 5000 -InformationLevel Quiet
      # المتوقع: True

      # 3. Frontend شغّال؟
      Test-NetConnection -ComputerName localhost -Port 3000 -InformationLevel Quiet
      # المتوقع: True
      ```

      **الجزء 2: Health endpoints**
      ```
      curl.exe -s -w "\nStatus: %{http_code}\n" --max-time 5 http://localhost:5000/health
      curl.exe -s -w "\nStatus: %{http_code}\n" --max-time 10 http://localhost:5000/health/live
      curl.exe -s -w "\nStatus: %{http_code}\n" --max-time 15 http://localhost:5000/health/ready
      ```
      المتوقع: كلهم 200.

      **الجزء 3: Auth flow كامل (fresh user)**
      ```
